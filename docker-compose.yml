version: "3.9"

services:
  db:
    image: postgres:16-alpine
    container_name: uwm_roommate_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-uwmroommatefinder}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-uwmroommatefinder}"]
      interval: 10s
      timeout: 5s
      retries: 5

  django:
    build: .
    container_name: uwm_roommate_django
    restart: unless-stopped
    env_file: .env
    environment:
      DB_HOST: db
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    depends_on:
      db:
        condition: service_healthy

  react:
    build: ./frontend
    container_name: uwm_roommate_react
    restart: unless-stopped
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - django

volumes:
  postgres_data:
